name: 'publish'

on:
  push:
    branches:
      - release

jobs:
  build-android:
    outputs:
      appVersion: ${{ steps.get_version.outputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Setup NDK toolchain
        run: |
          export PATH=$PATH:$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          ln -sf llvm-ranlib $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-ranlib || true

      - name: Initialize and Build Android
        run: |
          export PATH=$PATH:$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          # Recreate Android project on every CI run to avoid stale/incomplete generated files
          echo "📱 Reinitializing Android project..."
          rm -rf src-tauri/gen/android
          pnpm tauri android init
          
          # Verify initialization
          if [ ! -d "src-tauri/gen/android/app/src/main" ]; then
            echo "❌ Android initialization failed"
            exit 1
          fi

          # Restore Android customizations that must survive the generated project reset.
          echo "🧩 Restoring tracked Android customizations..."
          git checkout -- \
            src-tauri/gen/android/app/build.gradle.kts \
            src-tauri/gen/android/app/src/main/AndroidManifest.xml \
            src-tauri/gen/android/app/src/main/java/com/codexu/NoteGen/OcrPlugin.kt \
            src-tauri/gen/android/app/src/main/java/com/codexu/NoteGen/SystemBarsPlugin.kt \
            src-tauri/gen/android/app/src/main/res/values/colors.xml \
            src-tauri/gen/android/app/src/main/res/values/themes.xml \
            src-tauri/gen/android/app/src/main/res/values-night/themes.xml

          MANIFEST_PATH="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          test -f "$MANIFEST_PATH"
          test -f "src-tauri/gen/android/app/src/main/java/com/codexu/NoteGen/OcrPlugin.kt"
          test -f "src-tauri/gen/android/app/src/main/java/com/codexu/NoteGen/SystemBarsPlugin.kt"
          test -f "src-tauri/gen/android/app/src/main/res/values/colors.xml"
          test -f "src-tauri/gen/android/app/src/main/res/values/themes.xml"
          test -f "src-tauri/gen/android/app/src/main/res/values-night/themes.xml"
          grep -q 'android.permission.RECORD_AUDIO' "$MANIFEST_PATH"
          grep -q 'android:label="NoteGen"' "$MANIFEST_PATH"
          grep -q 'android:icon="@mipmap/ic_launcher"' "$MANIFEST_PATH"
          grep -q 'android:roundIcon="@mipmap/ic_launcher"' "$MANIFEST_PATH"
          grep -q 'Theme.note_gen' "$MANIFEST_PATH"
          grep -q 'class OcrPlugin' "src-tauri/gen/android/app/src/main/java/com/codexu/NoteGen/OcrPlugin.kt"
          grep -q 'class SystemBarsPlugin' "src-tauri/gen/android/app/src/main/java/com/codexu/NoteGen/SystemBarsPlugin.kt"
          grep -q 'Theme.MaterialComponents.DayNight.NoActionBar' "src-tauri/gen/android/app/src/main/res/values/themes.xml"
          grep -q 'text-recognition:16.0.1' "src-tauri/gen/android/app/build.gradle.kts"
          grep -q 'text-recognition-chinese' "src-tauri/gen/android/app/build.gradle.kts"
          grep -q 'text-recognition-japanese' "src-tauri/gen/android/app/build.gradle.kts"
          
          # Set custom Android icon
          echo "🎨 Setting custom Android icon..."
          ICON_SOURCE="public/app-ios-icon.png"
          MIPMAP_DIRS=(
            "src-tauri/gen/android/app/src/main/res/mipmap-mdpi"
            "src-tauri/gen/android/app/src/main/res/mipmap-hdpi"
            "src-tauri/gen/android/app/src/main/res/mipmap-xhdpi"
            "src-tauri/gen/android/app/src/main/res/mipmap-xxhdpi"
            "src-tauri/gen/android/app/src/main/res/mipmap-xxxhdpi"
          )

          mkdir -p "${MIPMAP_DIRS[@]}"
          
          # Install ImageMagick for icon conversion
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Generate different sizes
          convert "$ICON_SOURCE" -resize 48x48 "${MIPMAP_DIRS[0]}/ic_launcher.png"
          convert "$ICON_SOURCE" -resize 72x72 "${MIPMAP_DIRS[1]}/ic_launcher.png"
          convert "$ICON_SOURCE" -resize 96x96 "${MIPMAP_DIRS[2]}/ic_launcher.png"
          convert "$ICON_SOURCE" -resize 144x144 "${MIPMAP_DIRS[3]}/ic_launcher.png"
          convert "$ICON_SOURCE" -resize 192x192 "${MIPMAP_DIRS[4]}/ic_launcher.png"
          
          echo "✅ Android icon set successfully"
          
          echo "🔨 Building Android APK and AAB..."
          pnpm tauri android build --apk --aab

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/android-release.keystore
          ls -la src-tauri/android-release.keystore

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -o '"version": *"[^"]*"' src-tauri/tauri.conf.json | head -1 | sed 's/"version": *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Sign and Rename APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd src-tauri
          APK_PATH="gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          VERSION="${{ steps.get_version.outputs.version }}"
          SIGNED_APK="gen/android/app/build/outputs/apk/universal/release/NoteGen_${VERSION}_android-universal.apk"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK file not found at $APK_PATH"
            ls -la gen/android/app/build/outputs/apk/universal/release/ || true
            exit 1
          fi
          
          echo "📝 Signing APK with apksigner (V1 + V2 signatures)..."
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -n 1)/apksigner sign \
            --ks android-release.keystore \
            --ks-key-alias note-gen \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$APK_PATH"
          
          echo "✅ APK signed successfully"
          
          # Verify signature
          echo "🔍 Verifying APK signature..."
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -n 1)/apksigner verify --verbose "$SIGNED_APK"
          
          # Show file info
          ls -lh "$SIGNED_APK"

      - name: Rename AAB
        run: |
          cd src-tauri
          VERSION="${{ steps.get_version.outputs.version }}"
          AAB_PATH="gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab"
          RENAMED_AAB="gen/android/app/build/outputs/bundle/universalRelease/NoteGen_${VERSION}_android-universal.aab"
          
          if [ -f "$AAB_PATH" ]; then
            mv "$AAB_PATH" "$RENAMED_AAB"
            echo "✅ AAB renamed to: $RENAMED_AAB"
            ls -lh "$RENAMED_AAB"
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/NoteGen_*.apk
          if-no-files-found: error

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/NoteGen_*.aab
          if-no-files-found: warn

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: note-gen-v${{ steps.get_version.outputs.version }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/NoteGen_*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/NoteGen_*.aab
          draft: false
          prerelease: false

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f src-tauri/android-release.keystore

  publish-tauri:
    outputs:
      appVersion: ${{ steps.set_output.outputs.appVersion }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macos-arm64'
            bundlePath: 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/NoteGen_*.dmg'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macos-x64'
            bundlePath: 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/NoteGen_*.dmg'
          - platform: 'ubuntu-24.04'
            args: '--bundles deb,rpm'
            name: 'linux-deb-rpm'
            bundlePath: 'src-tauri/target/release/bundle/(rpm|deb)/NoteGen_*.(rpm|deb)'
          - platform: 'ubuntu-22.04'
            args: '--bundles appimage'
            name: 'linux-appimage'
            bundlePath: 'src-tauri/target/release/bundle/appimage/NoteGen_*.AppImage'
            noSign: true
          - platform: 'windows-latest'
            args: ''
            name: 'windows'
            bundlePath: 'src-tauri\target\release\bundle\(nsis|msi)\NoteGen_*.(exe|msi)'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          fi
          sudo apt-get update
          sudo apt-get install pkg-config libclang-dev libxcb1-dev libxrandr-dev libdbus-1-dev libpipewire-0.3-dev libwayland-dev libegl-dev libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libgbm-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm install

      - name: Import Apple Certificate
        id: import_apple_certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary_keychain_password' }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          DEVELOPER_ID_CERTIFICATE_PATH=$RUNNER_TEMP/developer_id_application.cer
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          cat > $RUNNER_TEMP/developer_id_application.cer.base64 <<'CERTIFICATE'
          MIIFoDCCBIigAwIBAgIICY4NvkqiiM0wDQYJKoZIhvcNAQELBQAweTEtMCsGA1UEAwwkRGV2ZWxv
          cGVyIElEIENlcnRpZmljYXRpb24gQXV0aG9yaXR5MSYwJAYDVQQLDB1BcHBsZSBDZXJ0aWZpY2F0
          aW9uIEF1dGhvcml0eTETMBEGA1UECgwKQXBwbGUgSW5jLjELMAkGA1UEBhMCVVMwHhcNMjYwMTAz
          MDYzNzQ4WhcNMjcwMjAxMjIxMjE1WjCBjzEaMBgGCgmSJomT8ixkAQEMClJHWkM0WlRKTVUxOjA4
          BgNVBAMMMURldmVsb3BlciBJRCBBcHBsaWNhdGlvbjogemhhbmcgeHVhbiAoUkdaQzRaVEpNVSkx
          EzARBgNVBAsMClJHWkM0WlRKTVUxEzARBgNVBAoMCnpoYW5nIHh1YW4xCzAJBgNVBAYTAkNOMIIB
          IjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAulYMjWSb2KBTz5HfVQlQeQyec6Y0szJZwSyZ
          +Xf0SqwPsHhQYi2LcVkhtCl/U9f8E5moJdlJlKuSYQY+HPYpFcjBXHaqNqYZNi5ZaVO0mEHMev6h
          O1+ROg0YYKcJA9PRy89Lurs+fLaM9TcO+f9eno7mMfXVE5zwUy5izRjQj4Hw7qSsvYq3wtL6HD/w
          sg85yiQ0gdVm0/7oih+eugi5UiUuZ4TAudQ0rEEZSde7gOKu5fKBJ59hNXW1F7CZsBTsbF4qhTmX
          SSYNMNmQZqkbXr1GRMV2GDOqPY6ZLHK/pTVOSvwU8LnJgepW0tFWaxScqnJUB+OkrsM5dsSJyCY9
          5wIDAQABo4ICEzCCAg8wDAYDVR0TAQH/BAIwADAfBgNVHSMEGDAWgBRXF+2iz9x8mKEQ4Py+hy0s
          8uMXVDBABggrBgEFBQcBAQQ0MDIwMAYIKwYBBQUHMAGGJGh0dHA6Ly9vY3NwLmFwcGxlLmNvbS9v
          Y3NwMDMtZGV2aWQwNjCCAR0GA1UdIASCARQwggEQMIIBDAYJKoZIhvdjZAUBMIH+MIHDBggrBgEF
          BQcCAjCBtgyBs1JlbGlhbmNlIG9uIHRoaXMgY2VydGlmaWNhdGUgYnkgYW55IHBhcnR5IGFzc3Vt
          ZXMgYWNjZXB0YW5jZSBvZiB0aGUgdGhlbiBhcHBsaWNhYmxlIHN0YW5kYXJkIHRlcm1zIGFuZCBj
          b25kaXRpb25zIG9mIHVzZSwgY2VydGlmaWNhdGUgcG9saWN5IGFuZCBjZXJ0aWZpY2F0aW9uIHBy
          YWN0aWNlIHN0YXRlbWVudHMuMDYGCCsGAQUFBwIBFipodHRwOi8vd3d3LmFwcGxlLmNvbS9jZXJ0
          aWZpY2F0ZWF1dGhvcml0eS8wFgYDVR0lAQH/BAwwCgYIKwYBBQUHAwMwHQYDVR0OBBYEFDvmL5xb
          jY8bAi8kmmuEdbv99SzPMA4GA1UdDwEB/wQEAwIHgDAfBgoqhkiG92NkBgEhBBEMDzIwMjUwOTE5
          MDAwMDAwWjATBgoqhkiG92NkBgENAQH/BAIFADANBgkqhkiG9w0BAQsFAAOCAQEAeJ+/xobJCCqw
          v6uHxuMcChq8osCeghdTbpzUM5qq987N6ZOfPpsbWdO/IhJPFs4enco3988ie8ZCR71SSbIaiTmR
          dlMB4QpGbnZp8vbsTKZhmltczDE5ycnbcKnl9F4oEqy96s4l6OKhJlMrvE7eWCWXv+7fOXoicaOO
          +B5vh0BjsH5NnzkgzcyYBgIpOQCEz1w8x1fWJYrGJc8/MnbvXg3xtMtt7jafiqA40NhhkuuuRiFw
          52L+LmDKTaAvkx20/IPqIJvkW9RnVfaflZIzPxfOjRBgRwaImftiCEBTq7nJOmmSt0H2RVerH9kU
          GeSkHC+6KibJYagzewL6436IQg==
          CERTIFICATE
          base64 --decode -i $RUNNER_TEMP/developer_id_application.cer.base64 -o $DEVELOPER_ID_CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -f pkcs12 -k $KEYCHAIN_PATH
          security import $DEVELOPER_ID_CERTIFICATE_PATH -A -t cert -k $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

          # Enable codesigning from a non user interactive shell
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Resolve the imported identity from the temporary keychain so the
          # workflow does not depend on a manually synchronized identity string.
          APPLE_SIGNING_IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | awk '/[[:xdigit:]]{40}/ {print $2; exit}')
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "No valid Apple codesigning identity found in imported certificate"
            security find-identity -v -p codesigning $KEYCHAIN_PATH
            exit 1
          fi
          echo "apple_signing_identity=$APPLE_SIGNING_IDENTITY" >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0.5.23
        id: tauri-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.import_apple_certificate.outputs.apple_signing_identity || secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: note-gen-v__VERSION__
          releaseName: 'NoteGen v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ matrix.bundlePath }}
          if-no-files-found: warn

      - name: Generate release tag
        id: save_tag
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          # 调试输出
          echo ${{ steps.tauri-action.outputs.appVersion }}
          # 输出到步骤级
          echo "appVersion=${{ steps.tauri-action.outputs.appVersion }}" >> $GITHUB_OUTPUT

      - name: Set job output
        id: set_output
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          # 注意：这里引用的是 save_tag 步骤的 tag_name 输出
          echo "appVersion=${{ steps.save_tag.outputs.appVersion }}" >> $GITHUB_OUTPUT

      - name: Cleanup keychain
        if: matrix.platform == 'macos-latest' && always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain $KEYCHAIN_PATH || true

  mirror-release-to-aliyun:
    needs:
      - build-android
      - publish-tauri
    if: ${{ always() && needs.build-android.result == 'success' && (needs.publish-tauri.result == 'success' || github.repository == 'codexu/note-gen-deploy-test') }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-android.outputs.appVersion }}
      OSSUTIL_VERSION: 2.3.0
      OSSUTIL_LINUX_AMD64_SHA256: 3ae4d9fc85a7a6e9f5654d1599766f1a3a42a3692870887b5ae9338d582ef65a
      OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      OSS_REGION: ${{ secrets.ALIYUN_REGION_ID }}
      OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ALIYUN_REGION_ID: ${{ secrets.ALIYUN_REGION_ID }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      ALIYUN_CDN_DOMAIN: ${{ secrets.ALIYUN_CDN_DOMAIN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Aliyun configuration
        run: |
          set -euo pipefail
          required_vars=(
            OSS_ACCESS_KEY_ID
            OSS_ACCESS_KEY_SECRET
            OSS_REGION
            OSS_ENDPOINT
            ALIYUN_ACCESS_KEY_ID
            ALIYUN_ACCESS_KEY_SECRET
            ALIYUN_REGION_ID
            ALIYUN_OSS_BUCKET
            ALIYUN_CDN_DOMAIN
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required secret or environment value: ${var_name}"
              exit 1
            fi
          done

      - name: Download GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$VERSION"
          gh release download "note-gen-v${VERSION}" --dir dist-release --clobber
          test -f dist-release/latest.json
          mkdir -p dist-oss
          find dist-release -maxdepth 1 -type f ! -name 'latest.json' -exec cp {} dist-oss/ \;
          test "$(find dist-oss -maxdepth 1 -type f | wc -l)" -gt 0
          ls -lh dist-release dist-oss

      - name: Install ossutil
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSLo "ossutil-${OSSUTIL_VERSION}-linux-amd64.zip" "https://gosspublic.alicdn.com/ossutil/v2/${OSSUTIL_VERSION}/ossutil-${OSSUTIL_VERSION}-linux-amd64.zip"
          echo "${OSSUTIL_LINUX_AMD64_SHA256}  ossutil-${OSSUTIL_VERSION}-linux-amd64.zip" | sha256sum -c -
          unzip -q "ossutil-${OSSUTIL_VERSION}-linux-amd64.zip"
          sudo install -m 755 "ossutil-${OSSUTIL_VERSION}-linux-amd64/ossutil" /usr/local/bin/ossutil
          ossutil version || ossutil --version || ossutil

      - name: Configure ossutil
        run: |
          set -euo pipefail
          OSSUTIL_CONFIG="$RUNNER_TEMP/.ossutilconfig"
          {
            echo "[default]"
            echo "accessKeyID=${OSS_ACCESS_KEY_ID}"
            echo "accessKeySecret=${OSS_ACCESS_KEY_SECRET}"
            echo "region=${OSS_REGION}"
            echo "endpoint=${OSS_ENDPOINT}"
          } > "$OSSUTIL_CONFIG"
          chmod 600 "$OSSUTIL_CONFIG"
          echo "OSSUTIL_CONFIG=$OSSUTIL_CONFIG" >> "$GITHUB_ENV"

      - name: Install Alibaba Cloud CLI
        uses: aliyun/setup-aliyun-cli-action@v1

      - name: Mirror installers to OSS
        run: |
          set -euo pipefail
          RELEASE_PREFIX="oss://${ALIYUN_OSS_BUCKET}/releases/note-gen-v${VERSION}/"
          if ! ossutil cp -r dist-oss/ "$RELEASE_PREFIX" \
              -c "$OSSUTIL_CONFIG" \
              --update \
              --force \
              --no-progress \
              --cache-control "public, max-age=31536000, immutable"; then
            echo "::group::ossutil error report"
            find ossutil_output -maxdepth 2 -type f -name '*.report' -print -exec sed -E 's/(AccessKeyId=)[^&[:space:]]+/\1***/g' {} \; || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Rewrite latest.json for CDN
        run: |
          set -euo pipefail
          CDN_DOMAIN="${ALIYUN_CDN_DOMAIN#https://}"
          CDN_DOMAIN="${CDN_DOMAIN#http://}"
          CDN_DOMAIN="${CDN_DOMAIN%/}"
          CDN_BASE_URL="https://${CDN_DOMAIN}"
          RELEASE_BASE_URL="${CDN_BASE_URL}/releases/note-gen-v${VERSION}"
          export RELEASE_BASE_URL
          node <<'NODE'
          const fs = require('node:fs')

          const latestJsonPath = 'dist-release/latest.json'
          const outputPath = 'latest.aliyun.json'
          const version = process.env.VERSION
          const releaseBaseUrl = process.env.RELEASE_BASE_URL
          const tag = `note-gen-v${version}`
          const marker = `/releases/download/${tag}/`
          const original = JSON.parse(fs.readFileSync(latestJsonPath, 'utf8'))
          let replacements = 0

          function rewrite(value) {
            if (typeof value === 'string') {
              try {
                const url = new URL(value)
                const markerIndex = url.pathname.indexOf(marker)
                if (url.hostname === 'github.com' && markerIndex !== -1) {
                  const assetName = url.pathname.slice(markerIndex + marker.length)
                  replacements += 1
                  return `${releaseBaseUrl}/${assetName}`
                }
              } catch {
                return value
              }

              return value
            }

            if (Array.isArray(value)) {
              return value.map(rewrite)
            }

            if (value && typeof value === 'object') {
              return Object.fromEntries(Object.entries(value).map(([key, entry]) => [key, rewrite(entry)]))
            }

            return value
          }

          const rewritten = rewrite(original)
          const downloadUrls = []

          function collectUrls(value) {
            if (typeof value === 'string') {
              if (/^https?:\/\//.test(value)) {
                downloadUrls.push(value)
              }
              return
            }

            if (Array.isArray(value)) {
              value.forEach(collectUrls)
              return
            }

            if (value && typeof value === 'object') {
              Object.values(value).forEach(collectUrls)
            }
          }

          collectUrls(rewritten)

          if (replacements === 0) {
            throw new Error('No GitHub release asset URLs were rewritten in latest.json')
          }

          const githubReleaseUrls = downloadUrls.filter((url) => url.includes(`github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${tag}/`))
          if (githubReleaseUrls.length > 0) {
            throw new Error(`Found ${githubReleaseUrls.length} unreplaced GitHub release asset URL(s)`)
          }

          const invalidCdnUrls = downloadUrls.filter((url) => url.includes('/releases/') && !url.startsWith(`${releaseBaseUrl}/`))
          if (invalidCdnUrls.length > 0) {
            throw new Error(`Found ${invalidCdnUrls.length} release URL(s) outside the CDN release prefix`)
          }

          fs.writeFileSync(outputPath, `${JSON.stringify(rewritten, null, 2)}\n`)
          console.log(`Rewrote ${replacements} release asset URL(s) to ${releaseBaseUrl}`)
          NODE

      - name: Upload CDN updater manifest
        run: |
          set -euo pipefail
          ossutil cp latest.aliyun.json "oss://${ALIYUN_OSS_BUCKET}/updates/latest.json" \
            -c "$OSSUTIL_CONFIG" \
            --force \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=60"

      - name: Refresh CDN updater manifest
        run: |
          set -euo pipefail
          CDN_DOMAIN="${ALIYUN_CDN_DOMAIN#https://}"
          CDN_DOMAIN="${CDN_DOMAIN#http://}"
          CDN_DOMAIN="${CDN_DOMAIN%/}"
          aliyun configure set \
            --mode AK \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET" \
            --region "$ALIYUN_REGION_ID"
          aliyun cdn RefreshObjectCaches \
            --ObjectPath "https://${CDN_DOMAIN}/updates/latest.json" \
            --ObjectType File \
            --region "$ALIYUN_REGION_ID"
